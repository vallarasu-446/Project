<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priyanka Dry Cleaners</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #2c3e50; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { width: 100%; background: #2ecc71; color: white; border: none; padding: 12px; font-size: 1.1rem; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .btn-track { width: 100%; background: #3498db; color: white; border: none; padding: 12px; font-size: 1.1rem; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .section-box { border: 1px solid #ddd; padding: 15px; border-radius: 5px; margin-top: 25px; background: #fafafa; }
        .result-box { margin-top: 15px; padding: 15px; border: 1px solid #2ecc71; background: #e8f8f5; border-radius: 5px; display: none; }
        .reply-box { margin-top: 10px; padding: 10px; background: #eef2f7; border-left: 5px solid #3498db; border-radius: 3px; font-style: italic; color: #34495e; }
    </style>
</head>
<body>

<div class="container">
    <h1>👔 Priyanka Dry Cleaners</h1>
    
    <!-- Order Form -->
    <form id="orderForm" onsubmit="submitOrder(event)">
        <label>Customer Name:</label>
        <input type="text" id="custName" required placeholder="Enter name...">

        <label>Mobile Number:</label>
        <input type="text" id="custPhone" required placeholder="10-digit mobile number..." maxlength="10">

        <label>Clothes Details:</label>
        <textarea id="clothesDetails" required placeholder="Example: Shirts(2), Pants(1)..."></textarea>

        <label>Total Bill Amount (₹):</label>
        <input type="number" id="totalAmount" required placeholder="Enter total bill...">

        <button type="submit" class="btn-submit">Confirm & Submit Order</button>
    </form>

    <!-- Track Order Live Section inside Frontend -->
    <div class="section-box">
        <h2>🔍 Your Recent Order History</h2>
        <p style="text-align: center; color: #7f8c8d; font-size: 0.9rem;">Enter Mobile Number to check status & admin replies live!</p>
        
        <input type="text" id="trackPhoneInput" placeholder="Enter 10-digit number here..." maxlength="10">
        <button type="button" class="btn-track" onclick="trackOrderLive()">Track Order Status</button>

        <div id="frontendResultBox" class="result-box">
            <p><b>Order Status:</b> <span id="fStatus" style="font-weight: bold; color: #f39c12;">Pending 🧺</span></p>
            <div class="reply-box">
                <b>Shop Update / Reply:</b> <br/>
                <span id="fReply">No updates from admin yet.</span>
            </div>
        </div>
    </div>
</div>

<script>
    // SATHYA - Unga Web App URL-ai inga paste pannunga:
    const BACKEND_API_URL = "YOUR_NEW_WEB_APP_URL";

    function submitOrder(e) {
        e.preventDefault();
        
        const orderData = {
            name: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            clothesDetails: document.getElementById('clothesDetails').value,
            total: document.getElementById('totalAmount').value,
            pickupDate: new Date().toISOString().split('T')[0],
            deliveryDate: new Date(Date.now() + 86400000).toISOString().split('T')[0],
            location: "Not Provided",
            express: "No 🐢"
        };

        alert("Submitting order... Please wait.");

        fetch(BACKEND_API_URL, {
            method: "POST",
            body: JSON.stringify(orderData)
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                // Save to local cache for admin dashboard visibility
                let localOrders = JSON.parse(localStorage.getItem('ironOrders')) || [];
                orderData.id = data.orderId;
                orderData.status = "Pending 🧺";
                localOrders.push(orderData);
                localStorage.setItem('ironOrders', JSON.stringify(localOrders));
                
                alert("Order Confirmed! Order ID: " + data.orderId);
                document.getElementById('orderForm').reset();
            }
        })
        .catch(err => alert("Error saving order. Check your URL link!"));
    }

    function trackOrderLive() {
        const phone = document.getElementById('trackPhoneInput').value.trim();
        const resBox = document.getElementById('frontendResultBox');

        if(phone.length < 10) {
            alert("Please enter a valid 10-digit mobile number.");
            return;
        }

        fetch(`${BACKEND_API_URL}?action=track&phone=${phone}`)
        .then(res => res.json())
        .then(data => {
            if(data && data.success) {
                resBox.style.display = 'block';
                document.getElementById('fStatus').innerText = data.order.status;
                document.getElementById('fReply').innerText = data.order.reply;
                
                if(data.order.status.includes('Delivered')) {
                    document.getElementById('fStatus').style.color = '#2ecc71';
                } else {
                    document.getElementById('fStatus').style.color = '#f39c12';
                }
            } else {
                alert("No active order found for this number!");
                resBox.style.display = 'none';
            }
        })
        .catch(err => alert("Error fetching live data."));
    }
</script>

</body>
</html>

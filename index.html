<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Priyanka Dry Cleaners</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-submit { width: 100%; background: #2ecc71; color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .track-section { margin-top: 30px; padding: 20px; border-top: 2px solid #eee; }
        #qrCode { display: none; text-align: center; margin: 10px 0; }
        .result-box { display: none; padding: 15px; background: #e8f8f5; border: 1px solid #2ecc71; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>👔 Priyanka Dry Cleaners</h1>
    
    <form id="orderForm" onsubmit="submitOrder(event)">
        <input type="text" id="name" placeholder="Name" required>
        <input type="tel" id="phone" placeholder="Mobile Number" maxlength="10" required>
        <textarea id="clothes" placeholder="Clothes Details (e.g., 2 Shirts, 1 Pant)" required></textarea>
        
        <label><input type="checkbox" id="express" onchange="calcTotal()"> Fast Delivery (+₹50)</label>
        
        <label>Payment Method:</label>
        <select id="payment" onchange="showQR()">
            <option value="COD">COD</option>
            <option value="GPAY">GPAY</option>
        </select>
        
        <div id="qrCode">
            <p>Scan to Pay:</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=paytmmp://upi/pay?pa=priyanka@oksbi" width="150">
        </div>

        <h3 id="totalDisplay">Total: ₹0</h3>
        <button type="submit" class="btn-submit">Submit Order</button>
    </form>

    <!-- Tracking Section -->
    <div class="track-section">
        <h3>🔍 Track Order & View Reply</h3>
        <input type="text" id="trackPhone" placeholder="Enter mobile number...">
        <button onclick="trackOrder()" style="width:100%; padding:10px;">Track</button>
        
        <div id="resultBox" class="result-box">
            <p>Status: <b id="lblStatus"></b></p>
            <p>Admin Reply: <i id="lblReply"></i></p>
        </div>
    </div>
</div>

<script>
    const BACKEND_API_URL = "YOUR_NEW_WEB_APP_URL"; // PASTE URL HERE

    function calcTotal() {
        let total = 200; // base price
        if(document.getElementById('express').checked) total += 50;
        document.getElementById('totalDisplay').innerText = "Total: ₹" + total;
    }

    function showQR() {
        document.getElementById('qrCode').style.display = 
            (document.getElementById('payment').value === 'GPAY') ? 'block' : 'none';
    }

    function submitOrder(e) {
        e.preventDefault();
        alert("Order Submitted!");
        // Add fetch logic to save to Google Sheet...
    }

    function trackOrder() {
        const phone = document.getElementById('trackPhone').value;
        fetch(`${BACKEND_API_URL}?action=track&phone=${phone}`)
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('lblStatus').innerText = data.order.status;
                document.getElementById('lblReply').innerText = data.order.reply;
            } else {
                alert("No Order Found!");
            }
        });
    }
</script>
</body>
</html>

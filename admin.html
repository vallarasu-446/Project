<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Ironing - Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #34495e; color: white; }
        .btn-deliver { background: #2ecc71; color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-weight: bold; }
        .btn-reply { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        input.reply-input { padding: 6px; width: 140px; border: 1px solid #ccc; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h1>👔 Priyanka Dry Cleaners - Admin Dashboard</h1>
    <p style="text-align: center; color: #7f8c8d;">Live Orders from Google Sheet</p>
    
    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Customer Name</th>
                <th>Phone</th>
                <th>Total Bill</th>
                <th>Status</th>
                <th>Actions / Send Reply</th>
            </tr>
        </thead>
        <tbody id="orderTableBody">
            <tr>
                <td colspan="6" style="text-align: center;">⏳ Loading live data from Google Sheet...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // SATHYA - Unga pudhu Web App URL-ai inga matum paste pannunga:
    const BACKEND_API_URL = "YOUR_NEW_WEB_APP_URL";

    // Load Data directly from Google Sheet via a sample tracking fetch or custom endpoint if built,
    // For now, it syncs with your storage and communicates back updates to Google Sheet live.
    function loadOrders() {
        const localOrders = JSON.parse(localStorage.getItem('ironOrders')) || [];
        const tbody = document.getElementById('orderTableBody');
        
        if(localOrders.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align: center;">No orders found in local cache. Submit a new order first!</td></tr>`;
            return;
        }
        
        tbody.innerHTML = "";
        localOrders.forEach(order => {
            tbody.innerHTML += `
                <tr>
                    <td>${order.id || 'N/A'}</td>
                    <td>${order.name}</td>
                    <td>${order.phone}</td>
                    <td>₹${order.total}</td>
                    <td id="status-${order.id}">${order.status || 'Pending 🧺'}</td>
                    <td>
                        <button class="btn-deliver" onclick="markAsDelivered('${order.id}')">Deliver & Paid</button>
                        <br/><br/>
                        <input type="text" id="input-${order.id}" class="reply-input" placeholder="Type reply...">
                        <button class="btn-reply" onclick="sendAdminReply('${order.id}')">Reply</button>
                    </td>
                </tr>
            `;
        });
    }

    function markAsDelivered(orderId) {
        if(!BACKEND_API_URL || BACKEND_API_URL.includes("YOUR_NEW")) {
            alert("Sathya, URL link-ai innum code-la paste pannala parunga!");
            return;
        }

        fetch(BACKEND_API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "markDelivered", id: orderId })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById(`status-${orderId}`).innerText = "Delivered & Paid ✅";
            // Update local storage too
            let localOrders = JSON.parse(localStorage.getItem('ironOrders')) || [];
            localOrders = localOrders.map(o => o.id == orderId ? {...o, status: "Delivered & Paid ✅"} : o);
            localStorage.setItem('ironOrders', JSON.stringify(localOrders));
            alert("Order updated to Google Sheet successfully!");
        })
        .catch(err => alert("Error updating status to server."));
    }

    function sendAdminReply(orderId) {
        const replyText = document.getElementById(`input-${orderId}`).value.trim();
        if(!replyText) {
            alert("Please type a reply message first!");
            return;
        }

        fetch(BACKEND_API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "addReply", id: orderId, reply: replyText })
        })
        .then(res => res.json())
        .then(data => {
            alert("Reply sent to customer & saved in Google Sheet!");
            document.getElementById(`input-${orderId}`).value = "";
        })
        .catch(err => alert("Error sending reply to server."));
    }

    window.onload = loadOrders;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priyanka Dry Cleaners - Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f3f3f3; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .refresh-btn { background: #3498db; color: white; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 20px; display: block; margin-left: auto; }
        .refresh-btn:hover { background: #2980b9; }
        
        /* Table Styling */
        .table-responsive { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-size: 0.9rem; }
        th { background-color: #2c3e50; color: white; }
        tr:hover { background-color: #f9f9f9; }
        
        /* Status Badges & Controls */
        select { padding: 6px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold; }
        .status-select { background: #fff; }
        .reply-input { width: 120px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; }
        
        .update-btn { background: #2ecc71; color: white; border: none; padding: 6px 12px; font-size: 0.85rem; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .update-btn:hover { background: #27ae60; }
        
        .geo-btn { background: #e74c3c; color: white; text-decoration: none; padding: 4px 8px; font-size: 0.8rem; border-radius: 4px; font-weight: bold; display: inline-block; }
        .geo-btn:hover { background: #c0392b; }
        
        .loading { text-align: center; font-size: 1.2rem; color: #7f8c8d; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>👔 Priyanka Dry Cleaners - Admin Dashboard</h1>
    <button class="refresh-btn" onclick="fetchOrders()">🔄 Refresh Orders</button>
    
    <div class="table-responsive">
        <table id="adminTable">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Mobile</th>
                    <th>Clothes Details</th>
                    <th>Total</th>
                    <th>Pickup</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Admin Reply (Column L)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="ordersList">
                <tr>
                    <td colspan="10" class="loading">Loading live orders from Google Sheet...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 🔗 உங்களது Google Apps Script Web App URL லிங்க்
    const BACKEND_API_URL = "https://script.google.com/macros/s/AKfycbwXfwzRhD7sPq8zOvM8d4vSnyJXvhFghmC37B3ceU-PHHv7I1dDwk-RLDFTT7JWZIhMuw/exec";

    // கூகுள் ஷீட்டில் இருந்து எல்லா ஆர்டர்களையும் இழுப்பது
    async function fetchOrders() {
        const tbody = document.getElementById('ordersList');
        tbody.innerHTML = '<tr><td colspan="10" class="loading">🔄 Syncing with Google Sheets...</td></tr>';
        
        try {
            // GET ரெக்வஸ்ட் மூலம் அனைத்து டேட்டாவையும் எடுக்கிறோம்
            let res = await fetch(BACKEND_API_URL);
            let cloudData = await res.json();
            let orders = cloudData.orders || [];

            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:20px; color:#aaa;">No orders found in the sheet.</td></tr>';
                return;
            }

            // புதிய ஆர்டர்கள் மேலே தெரியும்படி தலைகீழாக மாற்றுகிறோம் (Reverse)
            tbody.innerHTML = orders.reverse().map(o => {
                const orderID = o.orderId || o.id || "N/A";
                const statusVal = o.status || "Pending";
                const adminMsg = o.adminReply || "";
                
                // மேப் லொகேஷன் பட்டன்
                const locationHTML = (o.location && o.location.startsWith('http')) 
                    ? `<a href="${o.location}" target="_blank" class="geo-btn">📍 View Map</a>` 
                    : `<span style="color:#aaa;">None</span>`;

                return `
                    <tr id="row-${orderID}">
                        <td><b>${orderID}</b></td>
                        <td>${o.name || 'N/A'}</td>
                        <td><a href="tel:${o.phone}">${o.phone || 'N/A'}</a></td>
                        <td style="font-size:0.85rem; max-width:180px; color:#555;">${o.clothesDetails || 'N/A'}</td>
                        <td><mark><b>₹${o.total || '0'}</b></mark></td>
                        <td style="font-size:0.8rem;">${o.pickupDate || o.pickup || 'N/A'}</td>
                        <td>${locationHTML}</td>
                        <td>
                            <select id="status-${orderID}" class="status-select">
                                <option value="Pending 🧺" ${statusVal.includes('Pending') ? 'selected' : ''}>Pending 🧺</option>
                                <option value="Processing 🧼" ${statusVal.includes('Processing') ? 'selected' : ''}>Processing 🧼</option>
                                <option value="Ready for Delivery 🚚" ${statusVal.includes('Ready') ? 'selected' : ''}>Ready 🚚</option>
                                <option value="Delivered ✅" ${statusVal.includes('Delivered') ? 'selected' : ''}>Delivered ✅</option>
                                <option value="Cancelled ❌" ${statusVal.includes('Cancel') ? 'selected' : ''}>Cancelled ❌</option>
                            </select>
                        </td>
                        <td>
                            <input type="text" id="reply-${orderID}" class="reply-input" value="${adminMsg}" placeholder="Type notes here...">
                        </td>
                        <td>
                            <button class="update-btn" onclick="updateOrderStatus('${orderID}')">Save</button>
                        </td>
                    </tr>
                `;
            }).join('');

        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:20px; color:red;">❌ Failed to load data. Make sure Web App URL is correct and deployed as "Anyone".</td></tr>';
        }
    }

    // ஸ்டேட்டஸ் மற்றும் அட்மின் மெசேஜை கூகுள் ஷீட்டுக்கு சேமிப்பது
    async function updateOrderStatus(orderId) {
        const selectBox = document.getElementById(`status-${orderId}`);
        const replyInput = document.getElementById(`reply-${orderId}`);
        
        if (!selectBox || !replyInput) return;

        const updatedStatus = selectBox.value;
        const updatedReply = replyInput.value.trim();

        // விஷுவல் கன்பார்மேஷனுக்காக ரோவை மங்கலாக்குகிறோம்
        const row = document.getElementById(`row-${orderId}`);
        if(row) row.style.opacity = '0.5';

        try {
            // POST வழியாக மாப் செய்யப்பட்ட டேட்டாவை ஷீட்டுக்கு அனுப்புதல்
            let response = await fetch(BACKEND_API_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "UPDATE_STATUS", // உங்க Apps Script-ல் இந்த ஆக்ஷன் இருக்க வேண்டும்
                    orderId: orderId,
                    status: updatedStatus,
                    adminReply: updatedReply
                })
            });

            let resData = await response.json();
            if (resData.status === "success" || resData.result === "success") {
                alert(`🎯 Order ${orderId} Updated Successfully!`);
            } else {
                alert("⚠️ Sheet updated, but server returned unusual response.");
            }
        } catch (error) {
            alert("❌ Failed to update Google Sheet! Check your internet or Apps Script.");
        } finally {
            if(row) row.style.opacity = '1';
            fetchOrders(); // டேட்டாவை ரீலோடு செய்கிறோம்
        }
    }

    // விண்டோ லோடானதும் தானாக ஆர்டர்களை இழுக்கும்
    window.onload = fetchOrders;
</script>

</body>
</html>
